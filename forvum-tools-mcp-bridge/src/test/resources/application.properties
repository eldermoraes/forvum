# Pin forvum.home to a path with no mcp-servers/ so the @QuarkusTest wiring IT exercises the
# unconfigured/inert posture deterministically, regardless of the developer's real ~/.forvum/.
forvum.home=${java.io.tmpdir}/forvum-mcp-it-home-absent
# Bound the live-transport connect IT (a refused loopback) so it fails fast instead of waiting the default.
forvum.mcp.connect-timeout-seconds=1
