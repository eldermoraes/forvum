# Telegram channel (M17) REST-client default configuration.
#
# This is a LIBRARY module, so its defaults ship in META-INF/microprofile-config.properties (a config
# source loaded from every JAR on the classpath, ordinal 100) rather than application.properties (which
# Quarkus loads only from the application artifact, forvum-app — a dependency's application.properties is
# NOT a reliable config source in the assembled binary). This guarantees the rest-client config below is
# effective wherever forvum-channel-telegram is bundled; forvum-app or the operator (env vars) override at
# a higher ordinal.
#
# The Telegram Bot API base URL embeds the bot token, a per-deployment secret read from
# channels/telegram.json at runtime; TelegramBotApi overrides the base URL per invocation via @Url
# (TelegramChannel builds https://api.telegram.org/bot<TOKEN>). A static base URL is still required for the
# REST client to register, so this is the placeholder the @Url replaces.
quarkus.rest-client."telegram-bot-api".url=https://api.telegram.org

# read-timeout MUST exceed the long-poll timeout (forvum.channel.telegram.poll-timeout-seconds, 50 s) so
# getUpdates is never cut short by the client before Telegram returns. 60 s leaves a 10 s margin. (This is
# the correctness-critical line that must be effective in the assembled binary — hence microprofile-config.)
quarkus.rest-client."telegram-bot-api".read-timeout=60000
quarkus.rest-client."telegram-bot-api".connect-timeout=10000
