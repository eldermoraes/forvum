# Discord channel (P2-CH) default configuration.
#
# This is a LIBRARY module, so its defaults ship in META-INF/microprofile-config.properties (a config
# source loaded from every JAR on the classpath, ordinal 100) rather than application.properties (which
# Quarkus loads only from the application artifact, forvum-app — a dependency's application.properties is
# NOT a reliable config source in the assembled binary). This guarantees the config below is effective
# wherever forvum-channel-discord is bundled; forvum-app or the operator (env vars) override at a higher
# ordinal.

# Discord REST API base URL (https://discord.com/api/v10). Unlike Telegram, the bot token is NOT in the
# URL — it travels in the Authorization: Bot <token> header per invocation (DiscordRestClient), read from
# channels/discord.json at runtime. So this base URL is a fixed, non-secret value, not a placeholder.
quarkus.rest-client."discord-api".url=https://discord.com/api/v10
quarkus.rest-client."discord-api".connect-timeout=10000
quarkus.rest-client."discord-api".read-timeout=15000

# The Discord Gateway WebSocket URL (plain JSON, v10, NO zlib-stream in v0.1). DiscordChannel reads it via
# @ConfigProperty forvum.channel.discord.gateway-url and connects the DiscordGatewayEndpoint to it. The
# default below is also baked into the @ConfigProperty defaultValue; this line documents + pins it.
forvum.channel.discord.gateway-url=wss://gateway.discord.gg/?v=10&encoding=json
