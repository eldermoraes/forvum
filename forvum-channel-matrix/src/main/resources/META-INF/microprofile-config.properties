# Matrix channel (P2-CH) REST-client default configuration.
#
# This is a LIBRARY module, so its defaults ship in META-INF/microprofile-config.properties (a config
# source loaded from every JAR on the classpath, ordinal 100) rather than application.properties (which
# Quarkus loads only from the application artifact, forvum-app — a dependency's application.properties is
# NOT a reliable config source in the assembled binary). This guarantees the rest-client config below is
# effective wherever forvum-channel-matrix is bundled; forvum-app or the operator (env vars) override at
# a higher ordinal.
#
# The Matrix homeserver base URL is operator config read from channels/matrix.json at runtime;
# MatrixClientApi overrides the base URL per invocation via @Url (MatrixChannel builds it from the
# "homeserver" value). A static base URL is still required for the REST client to register, so this is
# the placeholder the @Url replaces. The access token NEVER rides the URL — it travels in the
# Authorization: Bearer <token> header per invocation.
quarkus.rest-client."matrix-client-api".url=https://matrix.org

# read-timeout MUST exceed the /sync long-poll timeout (forvum.channel.matrix.sync-timeout-millis,
# 30000 ms) so the long poll is never cut short by the client before the homeserver returns. 40 s leaves
# a 10 s margin. (This is the correctness-critical line that must be effective in the assembled binary —
# hence microprofile-config.)
quarkus.rest-client."matrix-client-api".read-timeout=40000
quarkus.rest-client."matrix-client-api".connect-timeout=10000
