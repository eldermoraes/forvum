# Qdrant memory provider (P2-5) REST-client default configuration.
#
# This is a LIBRARY module, so its defaults ship in META-INF/microprofile-config.properties (a config
# source loaded from every JAR on the classpath, ordinal 100) rather than application.properties (which
# Quarkus loads only from the application artifact, forvum-app — a dependency's application.properties is
# NOT a reliable config source in the assembled binary). This guarantees the rest-client config below is
# effective wherever forvum-provider-memory-qdrant is bundled; forvum-app or the operator (env vars)
# override at a higher ordinal.
#
# The Qdrant base URL is a per-deployment value read from memory/qdrant.json at runtime; QdrantApi
# overrides the base URL per invocation via @Url. A static base URL is still required for the REST client
# to register, so this is the placeholder the @Url replaces (a local Qdrant default; the provider is inert
# unless an operator enables it in memory/qdrant.json, so this default is never actually called).
quarkus.rest-client."qdrant-api".url=http://localhost:6333
quarkus.rest-client."qdrant-api".connect-timeout=5000
quarkus.rest-client."qdrant-api".read-timeout=15000
