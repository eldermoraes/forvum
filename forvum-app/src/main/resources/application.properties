# Forvum application configuration.
# Minimal at M1; subsystem config (SQLite, agents, channels, native-image tuning)
# lands in its owning milestone. The banner is disabled so command-mode output is
# just the rendered TamboUI frame.
quarkus.banner.enabled=false

# P2-QA (#43): the QA scenario pack (qa/scenarios.json) is read BY NAME via getResourceAsStream
# (QaScenarioLoader), so the native image must be told to include it — Quarkus excludes resources from
# the binary unless a glob names them. Include the whole qa/ tree so the bundled pack is reachable in
# `forvum qa suite` on the native binary (the [NATIVE] acceptance). This is the framework-idiomatic
# native resource hint (over a hand-authored META-INF/native-image/resource-config.json).
quarkus.native.resources.includes=qa/**

# M20: route the shipped binary's startup logs to stderr so a one-shot command's stdout is just the
# picocli usage / version (data on stdout, logs on stderr — the CLI convention). Scoped to prod so the
# in-JVM @QuarkusMainTest and dev mode keep logs on stdout. The interactive TUI also benefits: its
# TamboUI frame owns stdout, logs stay on stderr.
%prod.quarkus.log.console.stderr=true

# Keep one-shot commands (init / doctor / ask / --version) and the interactive TUI quiet: lower the
# shipped binary's console threshold to WARN so framework startup INFO (datasource, channel-disabled
# notices, "Installed features") does not bury the command's actual result, and silence two known,
# harmless framework WARNs that are expected for our SQLite / db-kind=other setup (Agroal "database
# kind: other"; Hibernate "unsupported properties" for hibernate.boot.allow_jdbc_metadata_access). The
# app's own intentional lines (banner, "Server channel(s) ready ...", errors) are printed directly to
# stdout/stderr and are unaffected. Operators running a server can restore detail with
# QUARKUS_LOG_CONSOLE_LEVEL=INFO. Scoped to prod so dev mode and the in-JVM tests keep full logging.
%prod.quarkus.log.console.level=WARN
%prod.quarkus.log.category."io.quarkus.agroal.runtime.AgroalConnectionConfigurer".level=ERROR
%prod.quarkus.log.category."io.quarkus.hibernate.orm.runtime.FastBootHibernatePersistenceProvider".level=ERROR

# A turn failure (most commonly: the model provider is not running) is caught by TurnService, which
# emits a single actionable line ("... Is the model provider running? (model: ...)"). The underlying
# frameworks ALSO log the same failure verbosely — LangGraph4j dumps the full exception at ERROR and
# LangChain4j logs every retry at WARN — flooding the terminal with hundreds of stack-trace lines
# before that one helpful line. Silence those two framework loggers in the shipped binary so the
# user-facing message stands alone (the app's own handling is the source of truth; raise with
# QUARKUS_LOG_CONSOLE_LEVEL / a category override when debugging).
%prod.quarkus.log.category."org.bsc.langgraph4j".level=OFF
%prod.quarkus.log.category."dev.langchain4j.internal.RetryUtils".level=OFF

# Observability (P2-15 #40): the §3.6 four-span baseline (forvum.agent.turn / forvum.graph.run /
# forvum.tool.call / forvum.llm.call, each carrying thread.is_virtual) is ALWAYS created, but the OTLP
# exporter is OFF unless OTEL_EXPORTER_OTLP_ENDPOINT is set — zero-config for Honeycomb/Tempo/Datadog.
# ForvumApplication.main disables the OTel SDK at runtime when that endpoint is absent (the M20
# system-property lever), so a default run pays zero telemetry overhead and skips the OTel SDK's resource
# detection. dev/test never export (no collector). service.name names the resource when it does.
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}
quarkus.otel.resource.attributes=service.name=forvum
%dev.quarkus.otel.sdk.disabled=true
%test.quarkus.otel.sdk.disabled=true

# Keep the in-JVM command-mode smoke (@QuarkusMainTest) off the developer's real ~/.forvum: point the
# home at a throwaway temp dir so PersistenceBootstrap migrates there. The native smoke (prod profile)
# uses the real home, which in CI is an ephemeral runner.
%test.forvum.home=${java.io.tmpdir}/forvum-apptest-home

# P3-6 #54: the Dev UI live config editor (DevConfigEditorRoute) is dev-mode ONLY — an explicit, documented
# native carve-out (the Quarkus Dev UI / fast-jar is not in the native binary). The route bean is gated with
# @IfBuildProperty, a BUILD-TIME flag, so it is removed entirely from the prod/native image: enabled in %dev
# (and %test, to exercise the validate-then-save-then-reload wiring), absent/false in prod → not built into
# the native binary, zero native surface, zero cold-start cost.
%dev.forvum.devui.config-editor.enabled=true
%test.forvum.devui.config-editor.enabled=true

# M12: the quarkus-langchain4j-ai-gemini extension auto-registers a default ChatModel synthetic bean,
# and its deployment recorder (AiGeminiRecorder#throwIfApiKeysNotConfigured) EAGERLY throws a
# ConfigValidationException while constructing that bean at startup when no api-key is set — unlike the
# OpenAI/Anthropic extensions, which are lazy. (The api-key mapping is itself Optional<String>; the
# eagerness is the recorder's, not a required @ConfigMapping.) Without a value the binary cannot boot —
# including the native no-~/.forvum smoke, which runs in the prod profile. So we supply a placeholder
# default across ALL profiles; the operator overrides it with the real key via the
# QUARKUS_LANGCHAIN4J_AI_GEMINI_API_KEY env var (higher config ordinal). Forvum never uses the extension's
# own default bean — GoogleModelProvider builds GoogleAiGeminiChatModel programmatically from this same
# key — so with the placeholder the provider is present but a real google:<model> turn fails at call
# time (not at boot) until the key is set, consistent with "fixed code, configurable behavior".
# (An alternative remedy, quarkus.langchain4j.ai.gemini.enable-integration=false, would suppress the
# eager check without a sentinel value, but is deferred to avoid re-validating native reachability of
# the programmatic path under a disabled integration.)
quarkus.langchain4j.ai.gemini.api-key=unset

# P2-6: Apache Maven Resolver (`forvum plugin install`) splits its `org.eclipse.aether.*` packages across
# several JARs. Under the Quarkus fast-jar runtime classloader those JARs land in different loaders, so
# wiring a RepositorySystem (RepositorySystemSupplier.get()) throws a loader-constraint LinkageError when
# the supplier's `Maven2RepositoryLayoutFactory` is checked against `ChecksumAlgorithmFactorySelector`.
# Loading the whole resolver artifact set parent-first puts every `org.eclipse.aether.*` class in one
# loader, so the signatures match. Parent-first is a classloading directive only — it does NOT eagerly
# initialize anything, so the resolver stays inert on the native classpath until install() runs (§6.2/§6.3).
quarkus.class-loading.parent-first-artifacts=org.apache.maven.resolver:maven-resolver-api,\
  org.apache.maven.resolver:maven-resolver-spi,\
  org.apache.maven.resolver:maven-resolver-impl,\
  org.apache.maven.resolver:maven-resolver-util,\
  org.apache.maven.resolver:maven-resolver-named-locks,\
  org.apache.maven.resolver:maven-resolver-connector-basic,\
  org.apache.maven.resolver:maven-resolver-transport-file,\
  org.apache.maven.resolver:maven-resolver-transport-http,\
  org.apache.maven.resolver:maven-resolver-supplier,\
  org.apache.maven:maven-resolver-provider

# Apache HttpClient 4.x (transitive via maven-resolver-transport-http) statically initializes a
# SecureRandom in NTLMEngineImpl; GraalVM native-image forbids a Random/SecureRandom in the image heap.
# Defer that class's initialization to run time — the resolver is inert on the native classpath until
# install() runs (§6.2/§6.3), so nothing native uses NTLM. [P2-6]
quarkus.native.additional-build-args=--initialize-at-run-time=org.apache.http.impl.auth.NTLMEngineImpl

# #165: authenticate + authorize the operator endpoints (the approval/CAPR dashboards and the chat
# socket). The custom OperatorAuthMechanism (the sole HttpAuthenticationMechanism) validates an
# `Authorization: Bearer <token>` header — or, for the WebSocket handshake where a browser cannot set a
# header, an `?access_token=<token>` query param — against OperatorCredentialStore and yields a
# SecurityIdentity with the `operator` role. This policy requires that role on the operator paths, so an
# anonymous/wrong-token request gets 401 and an authenticated non-operator gets 403. NOT %prod-scoped: the
# policy must also be active under @QuarkusTest (the auth E2Es assert 401/403/200). It only takes effect
# when the HTTP listener actually binds (a server channel is up), so a one-shot command (listener unbound,
# quarkus.http.host-enabled=false) is unaffected. Only the data/control paths are gated; the static Web UI
# (`/`) and health endpoints stay open (a path with no matching permission allows anonymous access).
# The dashboards stay operator-only; #166 admits a paired device (device-role) on the chat socket too.
quarkus.http.auth.policy.operator-role.roles-allowed=operator
quarkus.http.auth.permission.dashboard-endpoints.paths=/q/dashboard/*
quarkus.http.auth.permission.dashboard-endpoints.policy=operator-role
# #166: the chat socket admits the operator OR a paired device; the engine then re-authenticates the
# device token and intersects its approvedScopes at the turn.
quarkus.http.auth.policy.chat-role.roles-allowed=operator,device
quarkus.http.auth.permission.chat-endpoint.paths=/ws/chat
quarkus.http.auth.permission.chat-endpoint.policy=chat-role

# Many @QuarkusTests (and dev mode) enable a server channel (web/telegram/...) to exercise ChannelLauncher
# WITHOUT configuring an operator token, which the fail-closed startup guard (OperatorAuthFailClosed) would
# otherwise abort. Supply a default token in dev/test so those boots succeed; the auth E2Es override it with
# their own token via their @TestProfile (a profile override outranks this), and an anonymous request is
# still 401 (it presents no token). PROD keeps NO default, so a real deployment with a server channel but no
# credential fails closed — the security behavior under test. (OperatorAuthFailClosed is always active; the
# guard is never disabled by profile, only satisfied by a test/dev credential.)
%dev.forvum.operator.token=dev-operator-token
%test.forvum.operator.token=test-operator-default

