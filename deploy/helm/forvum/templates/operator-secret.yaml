{{- if .Values.operatorToken }}
# #165: the operator Bearer token the approval/CAPR dashboards and chat socket authenticate against,
# surfaced to the pod as FORVUM_OPERATOR_TOKEN (see deployment.yaml). Kept in a Secret so the token is
# never rendered into the Deployment manifest. Created only when .Values.operatorToken is set; without it
# the binary fails closed at startup (the Web listener is cluster-reachable).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "forvum.fullname" . }}-operator
  labels:
    {{- include "forvum.labels" . | nindent 4 }}
type: Opaque
stringData:
  operator-token: {{ .Values.operatorToken | quote }}
{{- end }}
