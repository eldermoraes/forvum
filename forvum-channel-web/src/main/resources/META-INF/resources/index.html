<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forvum</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid color-mix(in srgb, currentColor 15%, transparent);
            font-weight: 600;
        }
        header small { font-weight: 400; opacity: 0.6; margin-left: 0.5rem; }
        #log {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .msg {
            max-width: 70ch;
            padding: 0.5rem 0.75rem;
            border-radius: 0.75rem;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.4;
        }
        .msg.user { align-self: flex-end; background: #2563eb; color: #fff; }
        .msg.assistant { align-self: flex-start; background: color-mix(in srgb, currentColor 10%, transparent); }
        .msg.system { align-self: center; font-size: 0.8rem; opacity: 0.6; }
        form {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-top: 1px solid color-mix(in srgb, currentColor 15%, transparent);
        }
        #input {
            flex: 1;
            padding: 0.6rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
            background: transparent;
            color: inherit;
            font: inherit;
        }
        button {
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 0.5rem;
            background: #2563eb;
            color: #fff;
            font: inherit;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>Forvum <small>local-first AI on the JVM</small></header>
    <div id="log"></div>
    <form id="composer">
        <input id="input" type="text" autocomplete="off" placeholder="Message Forvum…" autofocus>
        <button id="send" type="submit">Send</button>
    </form>
    <script src="chat.js"></script>
</body>
</html>
