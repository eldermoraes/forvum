# WhatsApp channel @QuarkusTest config.
#
# forvum.home is pinned to a per-module build path so WhatsAppChannelConfig resolves channels/whatsapp.json
# under target/ (the IT writes/deletes that file per test to exercise the configured and no-config cases).
forvum.home=target/whatsapp-it-home

# Point the Graph API REST client at a dead local port so any reply send fails FAST (connection refused)
# and is swallowed — the IT never reaches the real graph.facebook.com (hermetic, no network).
quarkus.rest-client."whatsapp-graph-api".url=http://localhost:1
