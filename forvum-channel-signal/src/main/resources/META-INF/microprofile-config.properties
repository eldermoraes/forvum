# Signal channel (P2-CH, connect-only) REST-client default configuration.
#
# This is a LIBRARY module, so its defaults ship in META-INF/microprofile-config.properties (a config
# source loaded from every JAR on the classpath, ordinal 100) rather than application.properties (which
# Quarkus loads only from the application artifact, forvum-app — a dependency's application.properties is
# NOT a reliable config source in the assembled binary). This guarantees the rest-client config below is
# effective wherever forvum-channel-signal is bundled; forvum-app or the operator (env vars) override at
# a higher ordinal.
#
# The signal-cli daemon's base URL is OPERATOR config (baseUrl in channels/signal.json) read at runtime;
# SignalRpcApi overrides the base URL per invocation via @Url. A static base URL is still required for
# the REST client to register, so this is the placeholder the @Url replaces (signal-cli's default
# `daemon --http` bind).
quarkus.rest-client."signal-rpc".url=http://localhost:8080

# A JSON-RPC send is a short round-trip (the SSE event stream does NOT ride this client — it is a
# hand-rolled JDK HttpClient reader with no read timeout, since the stream blocks by design).
quarkus.rest-client."signal-rpc".connect-timeout=10000
quarkus.rest-client."signal-rpc".read-timeout=15000
