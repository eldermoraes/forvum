# Pin forvum.home to an empty path so the @QuarkusTest exercises the unconfigured posture (no real Copilot
# credentials) deterministically, regardless of the developer's ~/.forvum/.
forvum.home=${java.io.tmpdir}/forvum-copilot-it-home-absent
# OpenAI extension ships no eager api-key validation, but keep a placeholder so a swapped OpenAiChatModel
# build in the @QuarkusTest never trips a missing-key startup check.
quarkus.langchain4j.openai.api-key=unset
