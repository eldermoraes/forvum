name: CI

# Native is the primary, mandatory build target (CLAUDE.md section 5, ULTRAPLAN section 6).
# Every push/PR builds JVM + native on linux-amd64 (ubuntu-latest) and macos-arm64 (macos-14).
# M20 makes native MANDATORY on every cell (the native build gate) AND enforces the 200 ms cold-start
# gate: `forvum --help` must print help in < 200 ms measured from process start, on both cells.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm:
    name: JVM (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]   # linux-amd64 + macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      # Concurrency discipline (CLAUDE.md section 11, ULTRAPLAN section 3.8): static scan for
      # `synchronized` / Mutiny imports in the engine + channel hot paths (allowlists at repo root).
      #
      # NOTE: runtime virtual-thread pinning is NOT detected via `-Djdk.tracePinnedThreads`, which was
      # REMOVED in JDK 24+ (Forvum runs on JDK 25 — the flag is silently inert and would make a stderr
      # grep a vacuous always-pass gate). JEP 491 (JDK 24) also stopped `synchronized` from pinning,
      # leaving only native-code pins (e.g. SQLite JNI); surfacing those needs the JFR
      # `jdk.VirtualThreadPinned` event (the `quarkus-junit-virtual-threads` extension's @ShouldNotPin).
      # Wiring that JFR-based gate is a tracked follow-up; the static scan below is the enforced check.
      - name: Concurrency guardrails (no synchronized / no Mutiny in engine + channels)
        run: bash .github/concurrency-guardrails.sh
      # Native-first discipline (X1 / CLAUDE.md section 5/12): static scan of every module's src/main for
      # constructs that break the GraalVM native binary — sun.misc.Unsafe, CGLib / runtime Javassist,
      # dynamic class loading outside the JVM-only ~/.forvum/plugins/ drop-in (allowlists at repo root).
      # The native build catches these late and slowly; this fails the fast JVM job early with a file:line.
      - name: Native-first discipline (no Unsafe / CGLib / runtime Javassist / dynamic class loading)
        run: bash .github/native-discipline.sh
      # Reflection-registration (X1 / CLAUDE.md section 5/6.3): every wire DTO (a record in a `.dto.`
      # package of a Quarkus-bearing module) MUST carry @RegisterForReflection or Jackson cannot bind it
      # in native. A full Maven-enforcer over every record false-positives on JsonNode-tree-walk config
      # records, so this is the scoped, green-today grep gate (the full enforcer is documented-deferred).
      - name: Reflection-registration (DTO records carry @RegisterForReflection)
        run: bash .github/reflection-registration.sh
      # `verify` runs JaCoCo (X3 / ULTRAPLAN section 10): prepare-agent instruments the Surefire unit
      # run, then per-module `report` + `check` enforce the 80% LINE / 75% BRANCH coverage gate (the
      # native-profile Failsafe *IT smoke is deliberately not counted). A module below its threshold
      # fails this job. Per-module HTML/XML/CSV reports land under each module's target/site/jacoco/.
      #
      # `verify` also runs the X4 (#70) per-channel first-token latency gate (ChannelLatencyGateTest, a
      # forvum-app @QuarkusTest): TUI ≤ 200 ms / Web ≤ 300 ms / Telegram ≤ 500 ms p95, excluding inference
      # via the in-process FakeModelProvider. It is a regression alarm on the shared ChannelTurnDriver turn
      # (warm p95 is sub-millisecond), so no separate CI step is needed.
      - name: Build + test reactor (JVM) + coverage gate (JaCoCo 80% line / 75% branch)
        run: ./mvnw -B verify
      - name: Smoke-test fast-jar (must start and exit 0)
        run: |
          test -f forvum-app/target/quarkus-app/quarkus-run.jar
          java -jar forvum-app/target/quarkus-app/quarkus-run.jar

  native:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]   # linux-amd64 + macos-arm64
    steps:
      - uses: actions/checkout@v4
      # GitHub macOS runners have no resolvable hostname, so InetAddress.getLocalHost() — which the
      # OpenTelemetry host-resource detector and the Vert.x address resolver call at startup, independent
      # of the HTTP listener — stalls ~5 s, blowing the cold-start gate (and slowing the native smoke).
      # Map the hostname to loopback so it resolves instantly. Linux runners resolve fine, so guard on OS.
      - name: Ensure hostname resolves (macOS runner getLocalHost stall)
        if: runner.os == 'macOS'
        run: |
          echo "127.0.0.1 $(hostname)" | sudo tee -a /etc/hosts
          echo "::1 $(hostname)" | sudo tee -a /etc/hosts
      # linux-amd64 uses Mandrel 25.0.x-Final (M1's named native-image distribution).
      - name: Set up Mandrel (Linux)
        if: runner.os == 'Linux'
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: mandrel
          version: mandrel-25.0.3.0-Final
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
      # macos-arm64: Mandrel publishes no darwin-aarch64 build, so use GraalVM CE 25
      # (the equivalent native builder accepted by CLAUDE.md section 2).
      - name: Set up GraalVM CE (macOS)
        if: runner.os == 'macOS'
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
      - name: Build native binary + run native smoke (Failsafe @QuarkusMainIntegrationTest)
        run: ./mvnw -B -Pnative verify
      - name: Assert runner binary exists and runs
        run: |
          BIN=$(ls forvum-app/target/forvum-app-*-runner)
          test -x "$BIN"
          "$BIN"
      # M20 cold-start gate: `forvum --help` must print help in < 200 ms from process start (lazy-DB:
      # a one-shot command skips Flyway + the config watcher). Min of 5 runs to discount disk-cache cold.
      - name: Cold-start gate (forvum --help < 200 ms)
        run: |
          BIN=$(ls forvum-app/target/forvum-app-*-runner)
          python3 - "$BIN" <<'PY'
          import subprocess, sys, time
          binp = sys.argv[1]
          times = []
          for _ in range(5):
              t0 = time.perf_counter()
              r = subprocess.run([binp, "--help"], capture_output=True)
              times.append((time.perf_counter() - t0) * 1000)
              assert r.returncode == 0, f"--help exited {r.returncode}: {r.stderr.decode(errors='replace')}"
              assert b"Usage: forvum" in r.stdout, "no picocli usage in --help output"
          best = min(times)
          print(f"forvum --help cold-start: min={best:.0f} ms  runs={[round(t) for t in times]}")
          assert best < 200, f"cold-start {best:.0f} ms exceeds the 200 ms gate"
          PY
  # Risk #5 — the real-provider native scripted-turn smoke (closes the gap PR #111 fell through: every
  # other native leg is boot-only and never reaches resolve()/chat(), so a native-only provider
  # JSON/HTTP/reflection regression escaped silently). Drives a real Ollama turn through `forvum ask`
  # out-of-process against the built binary (OllamaNativeTurnIT). Gating (a failure blocks the merge).
  # Linux-only: the Ollama service container cannot run on the macOS runner.
  native-turn:
    name: Native real-provider turn (Risk #5, linux-amd64)
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v4
      - name: Set up Mandrel (Linux)
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: mandrel
          version: mandrel-25.0.3.0-Final
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
      # OllamaNativeTurnIT pins the main agent to ollama:qwen2.5:0.5b. Wait for the service, then pull the
      # model via the HTTP API (retried). The launched binary reaches it at the default base url
      # http://localhost:11434 (the mapped service port) — no -D plumbing needed (a -D on mvnw would not
      # reach the out-of-process binary anyway). The model is pulled fresh each run (~400 MB, not cached).
      - name: Pull the Ollama model (qwen2.5:0.5b)
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:11434/api/version >/dev/null && break
            echo "waiting for the ollama service... ($i)"; sleep 3
          done
          ok=
          for i in 1 2 3; do
            if curl -sf --max-time 600 http://localhost:11434/api/pull \
                 -d '{"name":"qwen2.5:0.5b","stream":false}'; then ok=1; break; fi
            echo "pull attempt $i failed; retrying"; sleep 5
          done
          [ "$ok" = 1 ] || { echo "::error::failed to pull qwen2.5:0.5b"; exit 1; }
          curl -sf http://localhost:11434/api/tags | grep -q 'qwen2.5:0.5b' \
            || { echo "::error::qwen2.5:0.5b not present after pull"; exit 1; }
      # Build the native binary and drive the real-provider turn (OllamaNativeTurnIT, @Tag("live")).
      # itExcludedGroups MUST be a non-empty no-op (none) — a blank one makes JUnit discover zero ITs
      # (see forvum-app/pom.xml). The two-cell `native` job above (boot smoke + 200 ms cold-start) stays
      # mandatory and unchanged; this job adds the turn coverage it cannot host (Ollama is linux-only).
      - name: Build native binary + run the real-provider turn (Risk #5)
        run: ./mvnw -B -Pnative verify -DitGroups=live -DitExcludedGroups=none
