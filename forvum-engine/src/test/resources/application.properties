# Engine test config. The OpenTelemetry SDK is OFF by default for engine @QuarkusTest runs (P2-15 #40):
# the four-span instrumentation (@WithSpan / Span.current()) becomes a no-op, so the many turn-path tests
# neither export nor pay any telemetry cost. TurnSpanIT re-enables the SDK (sdk.disabled=false) via its
# own @TestProfile + an InMemorySpanExporter to assert the spans are actually emitted.
quarkus.otel.sdk.disabled=true
