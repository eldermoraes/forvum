# WhatsApp channel (P2-CH) Graph API REST-client default configuration.
#
# This is a LIBRARY module, so its defaults ship in META-INF/microprofile-config.properties (a config
# source loaded from every JAR on the classpath, ordinal 100) rather than application.properties (which
# Quarkus loads only from the application artifact, forvum-app — a dependency's application.properties is
# NOT a reliable config source in the assembled binary). This guarantees the rest-client config below is
# effective wherever forvum-channel-whatsapp is bundled; forvum-app or the operator (env vars) override
# at a higher ordinal.
#
# The Graph API base URL is fixed (graph.facebook.com); the per-account phone-number-id rides the path
# built at runtime, and the access token NEVER rides the URL — it travels in the Authorization: Bearer
# <token> header per invocation. The send is a short request, so the default timeouts are tightened.
quarkus.rest-client."whatsapp-graph-api".url=https://graph.facebook.com
quarkus.rest-client."whatsapp-graph-api".read-timeout=15000
quarkus.rest-client."whatsapp-graph-api".connect-timeout=10000
