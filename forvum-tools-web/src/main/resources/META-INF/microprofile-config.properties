# Web tools (PR-6) Brave Search REST-client default configuration.
#
# This is a LIBRARY module, so its defaults ship in META-INF/microprofile-config.properties (a config
# source loaded from every JAR on the classpath, ordinal 100) rather than application.properties (which
# Quarkus loads only from the application artifact, forvum-app — a dependency's application.properties is
# NOT a reliable config source in the assembled binary, the [P2-5]/[M17] lesson). This guarantees the
# rest-client config below is effective wherever forvum-tools-web is bundled; forvum-app or the operator
# (env vars) override at a higher ordinal.
#
# The Brave Search base URL is a fixed, public host. The X-Subscription-Token (the Brave API key) is
# OPERATOR config supplied via env/forvum-app override OR the on-demand tools/web.json reader; it is
# passed as a per-invocation @HeaderParam, never a URL segment (so it never leaks in a URL — unlike
# Telegram). With no key, WebSearchTool returns a clear "not configured" string instead of calling, so
# the CI native no-config smoke is safe (inert-by-default).
quarkus.rest-client."brave-search".url=https://api.search.brave.com
quarkus.rest-client."brave-search".connect-timeout=5000
quarkus.rest-client."brave-search".read-timeout=15000
