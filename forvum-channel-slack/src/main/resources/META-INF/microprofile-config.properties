# Slack channel (P2-CH) default configuration.
#
# This is a LIBRARY module, so its defaults ship in META-INF/microprofile-config.properties (a config
# source loaded from every JAR on the classpath, ordinal 100) rather than application.properties (which
# Quarkus loads only from the application artifact, forvum-app — a dependency's application.properties is
# NOT a reliable config source in the assembled binary, the M17 lesson). This guarantees the config below
# is effective wherever forvum-channel-slack is bundled; forvum-app or the operator (env vars) override
# at a higher ordinal.

# Slack Web API base URL (https://slack.com/api). The tokens are NOT in the URL — they travel in the
# Authorization: Bearer <token> header per invocation (SlackRestClient), read from channels/slack.json at
# runtime. So this base URL is a fixed, non-secret value, not a placeholder. The Socket Mode WebSocket
# URL is NOT configured here: it is TEMPORARY, minted by apps.connections.open on every connect.
quarkus.rest-client."slack-api".url=https://slack.com/api
quarkus.rest-client."slack-api".connect-timeout=10000
quarkus.rest-client."slack-api".read-timeout=15000
