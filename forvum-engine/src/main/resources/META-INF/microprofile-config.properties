# Forvum schedules cron jobs PURELY PROGRAMMATICALLY (CronScheduler.newJob(...), no @Scheduled methods),
# so the Quarkus scheduler would not start by default — force it (M19).
#
# This lives in META-INF/microprofile-config.properties (SmallRye ordinal 100, loaded from EVERY jar on
# the classpath incl. the assembled forvum-app), NOT in application.properties: a dependency jar's
# application.properties is not a config source in the assembled binary, so it would silently fall back
# to the default ("halt") and the scheduler would never start in the app ([M17] lesson).
quarkus.scheduler.start-mode=forced
