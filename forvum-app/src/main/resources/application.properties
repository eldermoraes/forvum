# Forvum application configuration.
# Minimal at M1; subsystem config (SQLite, agents, channels, native-image tuning)
# lands in its owning milestone. The banner is disabled so command-mode output is
# just the rendered TamboUI frame.
quarkus.banner.enabled=false

# Keep the in-JVM command-mode smoke (@QuarkusMainTest) off the developer's real ~/.forvum: point the
# home at a throwaway temp dir so PersistenceBootstrap migrates there. The native smoke (prod profile)
# uses the real home, which in CI is an ephemeral runner.
%test.forvum.home=${java.io.tmpdir}/forvum-apptest-home

# M12: the quarkus-langchain4j-ai-gemini extension validates this property EAGERLY at startup (it is a
# required @ConfigMapping value, unlike the OpenAI/Anthropic api-keys which are lazy). Without it the
# binary cannot boot — including the native no-~/.forvum smoke, which runs in the prod profile. So we
# supply a placeholder default across ALL profiles; the operator overrides it with the real key via the
# QUARKUS_LANGCHAIN4J_AI_GEMINI_API_KEY env var (higher config ordinal). The Google provider builds its
# model programmatically from this same key, so with the placeholder the provider is present but a real
# google:<model> turn fails at call time (not at boot) until the key is set — consistent with
# "fixed code, configurable behavior".
quarkus.langchain4j.ai.gemini.api-key=unset

