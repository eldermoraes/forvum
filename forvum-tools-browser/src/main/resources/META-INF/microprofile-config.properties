# Browser tool (P2-1, #26) default configuration.
#
# This is a LIBRARY module, so its defaults ship in META-INF/microprofile-config.properties (a config
# source loaded from every JAR on the classpath, ordinal 100) rather than application.properties (which
# Quarkus loads only from the application artifact, forvum-app — a dependency's application.properties is
# NOT a reliable config source in the assembled binary). forvum-app or the operator (env vars) override at
# a higher ordinal.
#
# The CDP debug endpoint and timeouts are read from tools/browser.json at runtime (BrowserConfig); these
# are only fallback defaults used when that file is absent or omits a field.
forvum.tools.browser.debug-url=http://localhost:9222
forvum.tools.browser.connect-timeout-ms=5000
forvum.tools.browser.command-timeout-ms=15000
