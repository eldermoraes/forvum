# Forvum engine persistence (M5). SQLite has no Quarkus JDBC extension, so it is wired as an
# "Other database": db-kind=other + the bare Xerial driver + an explicit Hibernate community dialect.
#
# forvum.home mirrors ForvumHome's resolution precedence: a -Dforvum.home system property (ordinal
# 400) or the FORVUM_HOME env var (ordinal 300, mapped from forvum.home) override this default
# (ordinal 250). Declaring it here also makes ${forvum.home} resolvable for the JDBC URL expansion.
forvum.home=${user.home}/.forvum

quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
# WAL + busy_timeout for acceptable single-writer concurrency; foreign_keys=on so the messages ->
# sessions FK is actually enforced (SQLite defaults foreign keys off).
quarkus.datasource.jdbc.url=jdbc:sqlite:${forvum.home}/state/forvum.sqlite?journal_mode=WAL&busy_timeout=5000&foreign_keys=on
# SQLite is a single writer; a pool larger than one invites SQLITE_BUSY (see Risk #11).
quarkus.datasource.jdbc.max-size=1

quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
# Flyway owns the schema; Hibernate never generates or validates DDL (ULTRAPLAN section 4.2).
quarkus.hibernate-orm.schema-management.strategy=none
# The dialect is set explicitly, so Hibernate needs no boot-time JDBC metadata. Disabling that access
# stops an eager connection on the JPA startup thread that would race PersistenceBootstrap's state/
# dir creation and log a spurious SQLITE_CANTOPEN on first boot.
quarkus.hibernate-orm.unsupported-properties."hibernate.boot.allow_jdbc_metadata_access"=false
# With metadata access off, Hibernate can't detect the DB version, so its >= 2.0.0 version check would
# fail with version 0.0.0. The dialect is fixed and the schema is Flyway-owned (runtime is proven by
# the persistence ITs), so the check is unnecessary here.
quarkus.hibernate-orm.database.version-check.enabled=false

# Migration is triggered manually by PersistenceBootstrap AFTER it ensures $FORVUM_HOME/state exists.
# Quarkus' migrate-at-start runs Flyway during RUNTIME_INIT, before any StartupEvent observer, which
# would open the SQLite file before the state/ directory exists (SQLITE_CANTOPEN). Keep it off.
quarkus.flyway.migrate-at-start=false
quarkus.flyway.locations=classpath:db/migration
